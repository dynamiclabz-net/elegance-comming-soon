<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Elegance | Coming Soon</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
        :root{
            --gold:#d4af37;
            --bg:#070707;
            --text:#d7d7d7;
        }

        body{
            margin:0;
            background:
                radial-gradient(circle at top,#181818 0%,#0c0c0c 35%,#070707 100%);
            color:#fff;
            font-family:Inter,sans-serif;
            min-height:100vh;
            display:flex;
            align-items:center;
            overflow-x:hidden;
            position:relative;
        }

        body::before{
            content:"";
            position:fixed;
            inset:0;
            background:
            radial-gradient(circle at 15% 20%,rgba(212,175,55,.12),transparent 28%),
            radial-gradient(circle at 85% 85%,rgba(255,255,255,.05),transparent 25%);
            pointer-events:none;
        }

        .hero{
            width:100%;
            position:relative;
            z-index:2;
        }

        .badge-launch{
            display:inline-flex;
            align-items:center;
            gap:10px;
            border:1px solid rgba(212,175,55,.35);
            padding:10px 18px;
            border-radius:50px;
            color:var(--gold);
            letter-spacing:2px;
            font-size:.68rem;
            text-transform:uppercase;
            margin-top: 15px;
            /* margin-bottom:35px; */
        }

        .badge-launch span{
            width:8px;
            height:8px;
            background:var(--gold);
            border-radius:50%;
        }

        .logo{
            max-width:50rem;
            width:100%;
            margin-bottom:40px;
            filter:drop-shadow(0 0 18px rgba(212,175,55,.15));
        }

        h1{
            font-family:"Cormorant Garamond",serif;
            font-size:clamp(2.25rem,5.5vw,3.8rem);
            line-height:.95;
            font-weight:500;
            margin-bottom:20px;
        }

        .gold{
            color:var(--gold);
            font-style:italic;
        }

        p{
            color:var(--text);
            max-width:650px;
            margin:auto;
            line-height:1.9;
            font-size:1.05rem;
        }

        .btn-luxury{
            display:inline-flex;
            align-items:center;
            gap:16px;
            margin-top:45px;
            padding:16px 28px;
            background:#fff;
            color:#111;
            border-radius:60px;
            text-decoration:none;
            font-weight:500;
            transition:.35s;
        }

        .btn-luxury i{
            width:40px;
            height:40px;
            border-radius:50%;
            background:#111;
            color:#fff;
            display:flex;
            justify-content:center;
            align-items:center;
            transition:.35s;
            font-style:normal;
        }

        .btn-luxury:hover{
            transform:translateY(-5px);
            box-shadow:0 15px 40px rgba(212,175,55,.18);
        }

        .btn-luxury:hover i{
            background:var(--gold);
            color:#000;
        }

        .footer{
            margin-top:70px;
            color:#888;
            font-size:.9rem;
        }

        .footer a{
            color:var(--gold);
            text-decoration:none;
        }

        .copyright{
            margin-top:12px;
            color:#666;
            font-size:.82rem;
        }

        @media(max-width:768px){

            .hero{
                padding:60px 20px;
            }

            .logo{
                /* max-width:260px; */
                margin-bottom:30px;
            }

            p{
                font-size:.85rem;
            }

            .btn-luxury{
                width:100%;
                justify-content:center;
            }

        }
    </style>

</head>

<body>

<section class="hero">
    <div class="container text-center">
        <img src="elegance-logo-gold-dash.png" class="logo" alt="Elegance">

        <h1>
            A New Chapter<br>
            of <span class="gold">Elegance</span>
        </h1>

        <p>
            We're putting the final touches on a destination where timeless ethnic wear meets modern elegance.
            Our collections are almost ready to welcome you.
        </p>

        <div class="badge-launch">
            <span></span>
            Launching Soon
        </div>


        <!-- <a href="#" class="btn-luxury">
            Coming Soon
            <i>→</i>
        </a> -->

        <div class="footer fixed-bottom mb-4">
            Designed & Developed by
            <a href="https://dynamiclabz.net" target="_blank"><b>Dynamic Labz</b></a>

            <div class="copyright">
                © 2026 Elegance. All Rights Reserved.
            </div>
        </div>

    </div>
</section>

</body>
</html>
